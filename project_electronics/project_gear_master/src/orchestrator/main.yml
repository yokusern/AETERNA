name: GearMaster Daily Automation

on:
  schedule:
    - cron: '0 21 * * *' # 日本時間 6:00
  workflow_dispatch:

jobs:
  run-gearmaster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install google-generativeai python-dotenv requests pyyaml jinja2

      - name: Run Full Flow
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_DRY_RUN: "false"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AMAZON_ASSOCIATE_ID: ${{ secrets.AMAZON_ASSOCIATE_ID }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: gear-master run

      - name: Commit Mapping
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/post_mapping.json
          git commit -m "chore: update post mapping [skip ci]" || echo "No changes"
          git push
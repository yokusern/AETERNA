name: "[DEPRECATED] Product Planning - brain.ymlに統合済み"

on:
  workflow_dispatch:  # 手動実行のみ（定期実行はbrain.ymlが担当）

jobs:
  plan-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install anthropic requests

      - name: Plan Products
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
        run: |
          cd gumroad.auto
          python -m agents.product_planner_agent

      - name: Build Product
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd gumroad.auto
          python -m agents.product_builder_agent

      - name: Upload to Gumroad（非公開で登録）
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
        run: |
          cd gumroad.auto
          python -m agents.sales_optimizer_agent

      - name: Commit
        run: |
          git config user.name "AETERNA Bot"
          git config user.email "bot@aeterna-holdings.auto"
          git add gumroad.auto/products/ gumroad.auto/product_specs/ gumroad.auto/data/ || true
          git diff --staged --quiet || git commit -m "feat: auto-generated product $(date '+%Y-%m-%d')"
          git push || true

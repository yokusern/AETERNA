name: Affiliate.auto Daily Content Generation & Deployment

on:
  schedule:
    - cron: "0 21 * * *"  # 毎日21時（JST）
  workflow_dispatch:      # 手動トリガー

jobs:
  content-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-generativeai requests

      - name: Extract keywords
        run: |
          python Affiliate.auto/system/scripts/keyword_extractor.py

      - name: Generate content
        run: |
          python Affiliate.auto/system/scripts/content_generator.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Optimize for SEO
        run: |
          python Affiliate.auto/system/scripts/seo_optimizer.py

      - name: Insert affiliate links
        run: |
          python Affiliate.auto/system/scripts/affiliate_linker.py

      - name: Generate report
        run: |
          echo "✅ Content generation pipeline completed successfully"
          echo "📊 Generated articles are ready for deployment"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-articles
          path: Affiliate.auto/system/data/linked_articles/

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Content generation pipeline failed"
          echo "Check the logs for details"

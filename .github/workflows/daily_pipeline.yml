name: "[DEPRECATED] Daily Pipeline - brain.ymlに統合済み"

on:
  workflow_dispatch:  # 手動実行のみ（定期実行はbrain.ymlが担当）
  workflow_dispatch:
    inputs:
      skip_build:
        description: "商品制作をスキップ"
        type: boolean
        default: false
      publish:
        description: "制作後に公開する"
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          pip install anthropic requests

      - name: Step 1 - Analytics Agent（売上分析）
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          cd gumroad.auto
          python -m agents.analytics_agent

      - name: Step 2 - Strategist Agent（実行計画）
        run: |
          cd gumroad.auto
          python -m agents.strategist_agent

      - name: Step 3 - Product Planner（月・木のみ新商品企画）
        if: github.event.schedule == '0 12 * * 1,4' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd gumroad.auto
          python -m agents.product_planner_agent

      - name: Step 4 - Product Builder（未制作企画がある場合）
        if: ${{ !inputs.skip_build }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd gumroad.auto
          python -m agents.product_builder_agent

      - name: Step 5 - Sales Optimizer（登録・価格最適化）
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
        run: |
          cd gumroad.auto
          python -m agents.sales_optimizer_agent ${{ inputs.publish && '--publish' || '' }}

      - name: Save Reports to Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-${{ github.run_number }}
          path: |
            gumroad.auto/data/reports/
            gumroad.auto/data/daily_plan.json
          retention-days: 30

      - name: Commit Data Files
        run: |
          git config user.name "AETERNA Bot"
          git config user.email "bot@aeterna-holdings.auto"
          git add gumroad.auto/data/ gumroad.auto/product_specs/ || true
          git diff --staged --quiet || git commit -m "chore: daily pipeline data update $(date '+%Y-%m-%d')"
          git push || true

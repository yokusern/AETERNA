name: AETERNA Gumroad Autopilot - Daily Operation

on:
  schedule:
    - cron: "30 21 * * *"  # 毎日21:30 JSTに実行（Affiliateの30分後）
  workflow_dispatch:

jobs:
  gumroad-autopilot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Execute Gumroad Master Autopilot
        run: |
          cd gumroad.auto
          python system/scripts/master_autopilot.py

      - name: Upload execution reports
        uses: actions/upload-artifact@v4
        with:
          name: gumroad-reports
          path: |
            gumroad.auto/system/logs/**
            gumroad.auto/system/reports/**
          retention-days: 30

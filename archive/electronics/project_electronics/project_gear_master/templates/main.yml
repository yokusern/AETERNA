name: GearMaster Daily Automation

on:
  schedule:
    - cron: '0 21 * * *' # 毎日日本時間 6:00 (UTC 21:00)
  workflow_dispatch: # 手動実行用

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml python-dotenv google-generativeai jinja2

      - name: Run Automation
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_DRY_RUN: "false"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AMAZON_ASSOCIATE_ID: ${{ secrets.AMAZON_ASSOCIATE_ID }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: |
          # 1. Researcher: Gemini 1.5 Flash を使った市場調査 (スクリプトがある前提)
          # python -m src.researcher.main
          # 2. Publisher: 調査結果を WordPress へ投稿
          python -m src.publisher.automation --publish

      - name: Commit Mapping Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/post_mapping.json
          git commit -m "chore: update post mapping [skip ci]" || echo "No changes to commit"
          git push